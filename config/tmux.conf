set -g mouse on

# Status bar: show session name prominently, drop redundant pane title
set -g status-left " #S "
set -g status-left-length 40
set -g status-right " #(cat /tmp/tmux-last-msg-#{session_name} 2>/dev/null || echo '---') "
set -g status-interval 30
set -g automatic-rename off
set -g set-clipboard off
set -g window-size latest
set -g history-limit 10000
set -g destroy-unattached off

# Copy mouse selection to Windows clipboard via clip.exe (WSL2)
# Change this for non-WSL environments
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe"
